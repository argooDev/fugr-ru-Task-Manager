services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=db
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: task_web
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: task_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fugr_ru_tm
      MYSQL_ROOT_PASSWORD: 1
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

volumes:
  db_data: